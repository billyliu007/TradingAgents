# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Canonical GitHub repo (connect the Blueprint here):
#   https://github.com/billyliu007/alphalens-agent
# New Blueprint (after GitHub is linked):
#   https://dashboard.render.com/blueprint/new?repo=https://github.com/billyliu007/alphalens-agent
#
# Two web services by default:
# - tradingagents-service: TRADINGAGENTS_DEPLOY_MODE=hosted (centralized; DATABASE_URL + /admin).
# - Alphalens-Agent: TRADINGAGENTS_DEPLOY_MODE=ephemeral (AlphaLens public UI; BYOK in browser; omit DATABASE_URL).
#   Service name kept for existing Blueprints; changing `name` can create a duplicate service on sync.
#
# DATABASE_URL (Postgres, e.g. Neon): optional on hosted; used for analysis caching and
# app_settings. US ticker autocomplete is file-based (bundled JSON), not Postgres.
# migrate.py runs on every build and exits cleanly when DATABASE_URL is unset.
#
# Provider keys: hosted Dashboard and/or DB; ephemeral — user Settings only (not .env LLM keys).

services:
  - type: web
    name: tradingagents-service
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install --upgrade pip && pip install . && python migrate.py
    startCommand: uvicorn service.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/options
    envVars:
      - key: TRADINGAGENTS_DEPLOY_MODE
        value: hosted
      # Python version: see runtime.txt in repo root (Render-native).
      # At least one working LLM credential is required at runtime unless all
      # providers used are configured in /admin with DATABASE_URL set.
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: MOONSHOT_API_BASE
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      # /admin — set TRADINGAGENTS_ADMIN_PASSWORD in the Dashboard to enable.
      - key: TRADINGAGENTS_ADMIN_USER
        sync: false
      - key: TRADINGAGENTS_ADMIN_PASSWORD
        sync: false
      # Optional overrides
      - key: TRADINGAGENTS_RESULTS_DIR
        value: /tmp/tradingagents-results
      - key: TRADINGAGENTS_EXPORTS_DIR
        value: /tmp/tradingagents-exports
      - key: TRADINGAGENTS_SERVICE_HOST
        value: "0.0.0.0"

  # Ephemeral BYOK: no DATABASE_URL, no server LLM keys; users paste keys in Settings (session).
  - type: web
    name: Alphalens-Agent
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install --upgrade pip && pip install . && python migrate.py
    startCommand: uvicorn service.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/options
    envVars:
      - key: TRADINGAGENTS_DEPLOY_MODE
        value: ephemeral
      - key: TRADINGAGENTS_RESULTS_DIR
        value: /tmp/tradingagents-results
      - key: TRADINGAGENTS_EXPORTS_DIR
        value: /tmp/tradingagents-exports
      - key: TRADINGAGENTS_SERVICE_HOST
        value: "0.0.0.0"
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: TRADINGAGENTS_CORS_ORIGINS
        sync: false
